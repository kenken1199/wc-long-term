recommended_actions:
  軽量NG率_異常:
  - 軽量NG発生時刻のクラスター確認
  - 部材ロット切替の有無を製造記録で確認
  - 充填システム設定の確認
  過量NG率_異常:
  - 過量NG発生時刻のクラスター確認
  - 充填システム設定の確認
  平均下振れ_異常:
  - 基準値設定時の最初5個と実平均を比較
  - 基準値妥当性の確認
  - 充填システムのセンタリング確認
  平均上振れ_異常:
  - 基準値設定時の最初5個と実平均を比較
  - 充填システムのセンタリング確認
  シグマ増大_異常:
  - ロット内の重量推移を時系列確認
  - ドリフト・ばらつき要因の調査
  二個乗り_異常:
  - 二個乗り発生時刻の確認
  - 搬送・供給状態の確認
  装置異常_異常:
  - 装置動作異常レコードの時刻・種別確認
  - 設備保全への連絡検討
